services:
  kafka:
    image: apache/kafka:3.9.1
    container_name: kafka

    ports:
      - "9092:29092"

    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093

      KAFKA_LISTENERS: INTERNAL://:9092,EXTERNAL://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

    healthcheck:
      test:
        - CMD-SHELL
        - /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  producer:
    build:
      context: .
      dockerfile: Dockerfile

    environment:
      ALCHEMY_WEBSOCKET_URL: ${ALCHEMY_WEBSOCKET_URL:?ALCHEMY_WEBSOCKET_URL is required}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: ${KAFKA_TOPIC:-uniswap_v3_swaps}
      PROTOCOL: ${PROTOCOL:-uniswap_v3}
      ENABLED_PROTOCOLS: ${ENABLED_PROTOCOLS:-}
      AAVE_V3_POOL_ADDRESS: ${AAVE_V3_POOL_ADDRESS:-}
      CHAIN: ${CHAIN:-arbitrum}

    depends_on:
      kafka:
        condition: service_healthy

    init: true
    stop_grace_period: 20s
